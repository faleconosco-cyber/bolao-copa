<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolão Copa 2026 🇧🇷</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d0f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bolão Copa" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:           #0d0f14;
        --bg2:          #13161e;
        --bg3:          #1a1e28;
        --card:         #1e2330;
        --card2:        #252b3b;
        --neon:         #00e87a;
        --neon-dim:     #00c065;
        --neon-glow:    rgba(0,232,122,0.18);
        --amarelo:      #f5c400;
        --amarelo-glow: rgba(245,196,0,0.18);
        --vermelho:     #ff4757;
        --vermelho-dim: rgba(255,71,87,0.12);
        --branco:       #ffffff;
        --texto:        #e2e4ec;
        --texto-dim:    #5c6378;
        --borda:        rgba(255,255,255,0.06);
        --raio:         12px;
        --raio-sm:      8px;
      }

      body {
        font-family: 'Nunito', sans-serif;
        background: var(--bg);
        color: var(--texto);
        min-height: 100vh;
      }

      h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1.5px; }

      button {
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.15s ease;
      }
      button:hover:not(:disabled) { opacity: 0.9; }
      button:disabled { opacity: 0.35; cursor: not-allowed; }
      input, select { font-family: 'Nunito', sans-serif; }

      /* ── HEADER ── */
      .header {
        background: var(--bg2);
        border-bottom: 1px solid var(--borda);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-titulo { font-size: 22px; line-height: 1; flex: 1; color: var(--branco); }
      .header-titulo span { color: var(--neon); }
      .header-sub { color: var(--texto-dim); font-size: 11px; font-weight: 700; margin-top: 2px; font-family: 'Nunito', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; }
      .header-user { color: var(--texto-dim); font-size: 13px; font-weight: 600; text-align: right; }
      .header-user strong { color: var(--branco); }

      .btn-sair {
        background: transparent;
        color: var(--texto-dim);
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 12px;
        border: 1px solid var(--borda);
      }
      .btn-sair:hover:not(:disabled) { color: var(--branco); border-color: rgba(255,255,255,0.15); opacity: 1; }

      /* ── TABS ── */
      .tabs {
        display: flex;
        background: var(--bg2);
        border-bottom: 1px solid var(--borda);
        overflow-x: auto;
        padding: 0 12px;
      }
      .tab {
        padding: 13px 16px;
        background: none;
        color: var(--texto-dim);
        font-size: 13px;
        border-radius: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        white-space: nowrap;
        font-weight: 700;
      }
      .tab.ativa { color: var(--neon); border-bottom-color: var(--neon); opacity: 1; }
      .tab:hover:not(.ativa) { color: var(--texto); }

      /* ── CONTEÚDO ── */
      .conteudo { max-width: 660px; margin: 0 auto; padding: 20px 16px; }

      /* ── FASE TITULO ── */
      .fase-titulo {
        font-size: 11px;
        color: var(--texto-dim);
        margin: 24px 0 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .fase-titulo::before { content: ''; width: 3px; height: 12px; background: var(--neon); border-radius: 2px; flex-shrink: 0; }

      /* ── CARD DE JOGO ── */
      .jogo-card {
        background: var(--card);
        border-radius: var(--raio);
        padding: 14px 16px;
        margin-bottom: 8px;
        border: 1px solid var(--borda);
        transition: border-color 0.15s;
      }
      .jogo-card:hover { border-color: rgba(0,232,122,0.15); }
      .jogo-card.travado { opacity: 0.55; }
      .jogo-card.travado:hover { border-color: var(--borda); }

      .jogo-confronto { display: flex; align-items: center; gap: 10px; }
      .jogo-lado { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
      .jogo-time-nome { font-weight: 800; font-size: 14px; color: var(--branco); line-height: 1.15; word-break: break-word; }

      .vs {
        color: var(--texto-dim);
        font-weight: 800;
        font-size: 10px;
        letter-spacing: 1px;
        padding: 2px 7px;
        background: var(--bg3);
        border-radius: 4px;
        flex-shrink: 0;
        text-transform: uppercase;
      }

      .jogo-data { font-size: 11px; color: var(--texto-dim); text-align: right; margin-top: 8px; font-weight: 600; }

      .avanca-linha {
        margin-top: 11px;
        padding-top: 11px;
        border-top: 1px solid var(--borda);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--texto-dim);
        font-weight: 700;
      }
      .avanca-select {
        flex: 1;
        padding: 6px 10px;
        border-radius: var(--raio-sm);
        border: 1px solid rgba(0,232,122,0.25);
        background: var(--bg3);
        font-weight: 700;
        color: var(--branco);
        font-size: 13px;
        outline: none;
      }
      .avanca-select:focus { border-color: var(--neon); }
      .avanca-select option { background: var(--bg3); }

      /* ── STEPPER ── */
      .stepper { display: flex; align-items: center; gap: 4px; }
      .stepper-btn {
        width: 28px; height: 28px;
        border-radius: 6px;
        background: var(--bg3);
        color: var(--texto-dim);
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        padding: 0;
        border: 1px solid var(--borda);
        line-height: 1;
      }
      .stepper-btn:hover:not(:disabled) { background: var(--neon); color: #0d0f14; border-color: var(--neon); opacity: 1; }
      .stepper-num {
        min-width: 40px;
        text-align: center;
        font-size: 30px;
        font-family: 'Bebas Neue', sans-serif;
        color: var(--neon);
        line-height: 1;
      }

      /* ── CLASSIF TABLE ── */
      .classif-table { width: 100%; border-collapse: collapse; }
      .classif-table th {
        padding: 10px 14px;
        text-align: left;
        background: var(--bg3);
        color: var(--texto-dim);
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
      }
      .classif-table th:first-child { border-radius: var(--raio-sm) 0 0 var(--raio-sm); }
      .classif-table th:last-child { border-radius: 0 var(--raio-sm) var(--raio-sm) 0; }
      .classif-table td { padding: 12px 14px; border-bottom: 1px solid var(--borda); font-size: 14px; }
      .classif-table tr:last-child td { border-bottom: none; }
      .pos-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--texto-dim); }
      .pos-num.top { color: var(--amarelo); }

      /* ── BOLO CARD ── */
      .bolo-card {
        background: var(--card);
        border: 1px solid rgba(245,196,0,0.15);
        border-radius: var(--raio);
        padding: 16px 20px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .bolo-label { font-size: 11px; color: var(--texto-dim); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
      .bolo-valor { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--amarelo); line-height: 1; }

      /* ── ARTILHEIRO CARD ── */
      .artilheiro-card {
        background: var(--card);
        border-radius: var(--raio);
        padding: 20px;
        border: 1px solid var(--borda);
      }
      .artilheiro-titulo { font-size: 26px; color: var(--branco); margin-bottom: 6px; }
      .artilheiro-desc { color: var(--texto-dim); font-size: 13px; margin-bottom: 16px; font-weight: 600; }

      /* ── LOCK BADGE ── */
      .lock-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--vermelho-dim);
        color: var(--vermelho);
        font-size: 10px;
        font-weight: 800;
        padding: 3px 7px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* ── ADMIN ── */
      .admin-header {
        background: var(--bg2);
        border-bottom: 1px solid var(--borda);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .admin-titulo { color: var(--branco); font-size: 20px; flex: 1; white-space: nowrap; }
      .admin-titulo span { color: var(--neon); }
      .admin-tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--borda); padding: 0 12px; }
      .admin-tab {
        padding: 12px 18px;
        background: none;
        color: var(--texto-dim);
        font-size: 13px;
        border-radius: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        font-weight: 700;
      }
      .admin-tab.ativa { color: var(--neon); border-bottom-color: var(--neon); opacity: 1; }

      /* ── BOTÕES ── */
      .btn-neon, .btn-verde {
        background: var(--neon);
        color: #0d0f14;
        padding: 10px 18px;
        border-radius: var(--raio-sm);
        font-size: 14px;
        font-weight: 800;
      }
      .btn-neon:hover:not(:disabled), .btn-verde:hover:not(:disabled) { box-shadow: 0 0 20px var(--neon-glow); opacity: 1; }
      .btn-perigo {
        background: var(--vermelho-dim);
        color: var(--vermelho);
        padding: 4px 10px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 700;
      }
      .btn-perigo:hover:not(:disabled) { background: var(--vermelho); color: var(--branco); opacity: 1; }

      /* ── INPUT ── */
      .input {
        padding: 10px 13px;
        border-radius: var(--raio-sm);
        border: 1px solid var(--borda);
        background: var(--bg3);
        color: var(--branco);
        font-size: 14px;
        width: 100%;
        transition: border-color 0.15s;
        outline: none;
      }
      .input:focus { border-color: var(--neon); }
      .input::placeholder { color: var(--texto-dim); }

      /* ── PIN DESTAQUE ── */
      .pin-destaque {
        background: rgba(0,232,122,0.06);
        border: 1px solid rgba(0,232,122,0.25);
        border-radius: var(--raio);
        padding: 14px 18px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .pin-codigo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 8px; color: var(--neon); }

      /* ── LOGIN ── */
      .login-bg {
        min-height: 100vh;
        background: var(--bg);
        background-image:
          radial-gradient(ellipse at 20% 60%, rgba(0,232,122,0.07) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 20%, rgba(245,196,0,0.04) 0%, transparent 45%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-card {
        background: var(--card);
        border: 1px solid var(--borda);
        border-radius: 18px;
        padding: 40px 32px;
        width: 100%;
        max-width: 340px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        text-align: center;
      }
      .login-titulo { font-size: 36px; color: var(--branco); margin: 14px 0 4px; line-height: 1; }
      .login-titulo span { color: var(--neon); }
      .login-sub { color: var(--texto-dim); font-size: 13px; font-weight: 600; margin-bottom: 26px; }
      .login-input {
        padding: 14px;
        border-radius: 10px;
        border: 1px solid var(--borda);
        background: var(--bg3);
        font-size: 26px;
        text-align: center;
        letter-spacing: 8px;
        width: 100%;
        font-weight: 400;
        color: var(--neon);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        font-family: 'Bebas Neue', sans-serif;
      }
      .login-input:focus { border-color: var(--neon); box-shadow: 0 0 0 3px var(--neon-glow); }
      .login-input::placeholder { color: var(--texto-dim); letter-spacing: 3px; font-size: 15px; font-family: 'Nunito', sans-serif; }
      .login-btn {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        font-size: 17px;
        background: var(--neon);
        color: #0d0f14;
        border-radius: 10px;
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 2px;
      }
      .login-btn:hover:not(:disabled) { box-shadow: 0 0 28px var(--neon-glow); opacity: 1; }
      .login-erro { color: var(--vermelho); font-size: 13px; margin-top: 8px; font-weight: 700; }
      .login-admin { font-size: 12px; color: var(--texto-dim); background: none; border: none; margin-top: 18px; cursor: pointer; }
      .login-admin:hover { color: var(--texto); opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
